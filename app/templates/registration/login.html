{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <section class="page">
    <div class="page-header">
      <div>
        <h1>Sign in</h1>
        <p>Access document ingestion, structured extraction and company dashboards.</p>
      </div>
    </div>
    <section class="panel">
      <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
        <div class="form-actions">
          <button type="submit">Sign in</button>
        </div>
      </form>
    </section>
  </section>
{% endblock %}
