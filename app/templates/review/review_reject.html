{% extends "base.html" %}

{% block title %}Reject Review{% endblock %}

{% block content %}
  <section class="page">
    <div class="page-header">
      <div>
        <h1>Reject review task</h1>
        <p>Explain why this extraction should not be approved.</p>
      </div>
      <div class="actions">
        <a class="button button-secondary" href="{% url 'review-detail' review_task.id %}">Back to review</a>
      </div>
    </div>
    <section class="panel">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
          <button class="button-danger" type="submit">Reject extraction</button>
        </div>
      </form>
    </section>
  </section>
{% endblock %}
