services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: python app/manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.example
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: celery -A config.celery_app worker -l info
    env_file:
      - .env.example
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: celery -A config.celery_app beat -l info
    env_file:
      - .env.example
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: balanco
      POSTGRES_USER: balanco
      POSTGRES_PASSWORD: balanco
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
